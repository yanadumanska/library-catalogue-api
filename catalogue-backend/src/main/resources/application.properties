spring.application.name=catalogue

server.port=8080

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/library_db?options=-c%20TimeZone=UTC
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.assumeMinServerVersion=13

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Kyiv

# Swagger configuration
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# Cache configuration
spring.cache.type=simple
spring.cache.cache-names=books,book,availableBooks

logging.level.org.hibernate.orm.jdbc.bind=TRACE